name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bysell
          POSTGRES_USER: bysell
          POSTGRES_PASSWORD: bysell
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Build and test backend
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/bysell
          DATABASE_USERNAME: bysell
          DATABASE_PASSWORD: bysell
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-only-dummy-secret-never-used-outside-this-workflow-run
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_SERVICE_KEY: ci-placeholder-key
        run: ./mvnw -B test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck and build
        working-directory: frontend
        run: npm run build
