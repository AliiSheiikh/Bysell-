name: Render Keep-Alive

on:
  schedule:
    # Every 10 minutes, comfortably inside Render's 15-minute
    # free-tier spin-down window, to keep the app warm around the clock.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the live app
        run: curl -sf https://bysell.onrender.com/api/items
